name: flutter_blue_ce_darwin
description: iOS and macOS implementation of the flutter_blue_ce plugin.
version: 2.3.8+ce.1
publish_to: none
homepage: https://github.com/notquiteog/flutter_blue_ce_darwin

environment:
  sdk: ^3.0.0
  flutter: '>=3.7.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_ce_platform_interface:
    git:
      url: https://github.com/notquiteog/flutter_blue_ce_platform_interface.git
      ref: main

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    implements: flutter_blue_ce
    platforms:
      ios:
        pluginClass: FlutterBluePlusPlugin
        dartPluginClass: FlutterBluePlusDarwin
        sharedDarwinSource: true
      macos:
        pluginClass: FlutterBluePlusPlugin
        dartPluginClass: FlutterBluePlusDarwin
        sharedDarwinSource: true
